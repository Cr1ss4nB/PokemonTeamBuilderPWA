<div class="container-fluid px-0">

  <div class="header-container text-center">
    <h1 class="main-title">
      <strong>Pokemon Team Builder PWA</strong>
    </h1>
  </div>

  <div class="subtitle-bar text-center">
    <p class="subtitle">
      <strong>Busca y crea tus equipos Pokémon</strong>
    </p>
  </div>

  <div class="container filter-container">
    <div class="row justify-content-center g-3">

      <!-- BUSCADOR -->
      <div class="col-12 col-md-6 col-lg-4">
        <div class="search-box-wrapper">
          <input
            type="text"
            class="form-control search-input"
            placeholder="Introduce el nombre de un Pokémon..."
            [(ngModel)]="searchText"
            (input)="filterPokemons()"
          >
        </div>
      </div>

      <!-- FILTRO TIPO -->
      <div class="col-12 col-md-4 col-lg-3">
        <div class="select-box-wrapper">
          <select
            class="form-select type-select"
            [(ngModel)]="selectedType"
            (change)="filterPokemons()"
          >

            <option value="">
              Todos los tipos
            </option>

            <option
              *ngFor="let type of pokemonTypes"
              [value]="type"
            >
              {{ type | titlecase }}
            </option>

          </select>
        </div>
      </div>

      <!-- FILTRO REGION -->
      <div class="col-12 col-md-4 col-lg-3">
        <div class="select-box-wrapper">
          <select
            class="form-select type-select"
            [(ngModel)]="selectedRegion"
            (change)="filterPokemons()"
          >

            <option value="">
              Todas las regiones
            </option>

            <option
              *ngFor="let region of regions"
              [value]="region.name"
            >
              {{ region.name }}
            </option>

          </select>
        </div>
      </div>

    </div>
  </div>

  <div class="container pb-5">
    <div class="row g-4">

      <div
        class="col-md-4 col-lg-3 mb-4"
        *ngFor="let pokemon of filteredPokemons"
      >

        <div class="card pokemon-card h-100">

          <div class="pokemon-image-container">
            <img
              [src]="pokemon.image"
              [alt]="pokemon.name"
              class="pokemon-image"
            >
          </div>

          <div class="card-body text-center">

            <h5 class="pokemon-name">
              #{{ pokemon.id }} {{ pokemon.name | titlecase }}
            </h5>

            <div class="mt-3">

              <span
                class="badge pokemon-badge me-2"
                [ngClass]="'type-' + type"
                *ngFor="let type of pokemon.types"
              >
                {{ type }}
              </span>

            </div>

          </div>

        </div>

      </div>

    </div>
  </div>

</div>
